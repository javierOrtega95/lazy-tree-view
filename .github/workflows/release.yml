name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      published: ${{ steps.check.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: pkg
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        run: |
          if npm view "lazy-tree-view@${{ steps.pkg.outputs.version }}" version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.published == 'false'
        run: pnpm install --frozen-lockfile

      - name: Test
        if: steps.check.outputs.published == 'false'
        run: pnpm test

      - name: Build
        if: steps.check.outputs.published == 'false'
        run: pnpm build

      - name: Upload build artifact
        if: steps.check.outputs.published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist

  publish:
    needs: check-and-test
    if: needs.check-and-test.outputs.published == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: package-dist

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create tag and GitHub Release
        run: |
          VERSION=${{ needs.check-and-test.outputs.version }}
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
